<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>碎碎念 · 语音日记</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="碎碎念">
<link rel="apple-touch-icon" href="/icon.png">
<meta name="theme-color" content="#13100e">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #13100e;
    --bg2: #1c1814;
    --bg3: #252018;
    --warm: #e8a857;
    --warm2: #c47f2e;
    --warm-dim: rgba(232,168,87,0.12);
    --warm-glow: rgba(232,168,87,0.06);
    --text: #e8ddd0;
    --text-dim: #9a8f82;
    --red: #d4604a;
    --border: rgba(232,168,87,0.15);
  }

  [data-theme="light"] {
    --bg: #faf8f4;
    --bg2: #f2ede4;
    --bg3: #e8e0d2;
    --warm: #b5740a;
    --warm2: #8a5500;
    --warm-dim: rgba(181,116,10,0.1);
    --warm-glow: rgba(181,116,10,0.05);
    --text: #2a1f0f;
    --text-dim: #7a6e5e;
    --red: #c0392b;
    --border: rgba(120,90,40,0.18);
  }

  @media (prefers-color-scheme: light) {
    [data-theme="auto"] {
      --bg: #faf8f4;
      --bg2: #f2ede4;
      --bg3: #e8e0d2;
      --warm: #b5740a;
      --warm2: #8a5500;
      --warm-dim: rgba(181,116,10,0.1);
      --warm-glow: rgba(181,116,10,0.05);
      --text: #2a1f0f;
      --text-dim: #7a6e5e;
      --red: #c0392b;
      --border: rgba(120,90,40,0.18);
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Serif SC', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% -10%, rgba(232,168,87,0.08) 0%, transparent 70%);
  }

  .main {
    width: 100%;
    max-width: 500px;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Record button */
  .record-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 32px 20px;
    background: var(--bg2);
    border-radius: 24px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .record-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(232,168,87,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .record-btn {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 2px solid var(--warm);
    background: var(--warm-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  .record-btn:hover { background: rgba(232,168,87,0.2); transform: scale(1.05); }
  .record-btn:active { transform: scale(0.95); }

  .record-btn.recording {
    border-color: var(--red);
    background: rgba(212,96,74,0.15);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(212,96,74,0.4); }
    50% { box-shadow: 0 0 0 16px rgba(212,96,74,0); }
  }

  .mic-icon {
    width: 32px;
    height: 32px;
    fill: var(--warm);
    transition: fill 0.2s;
  }
  .record-btn.recording .mic-icon { fill: var(--red); }

  .record-hint {
    font-size: 0.82rem;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.6;
    min-height: 40px;
    display: flex;
    align-items: center;
  }

  .timer {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.4rem;
    color: var(--red);
    min-width: 60px;
    text-align: center;
    display: none;
  }
  .timer.visible { display: block; }

  /* Entries list */
  .section-title {
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
    padding: 0 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .entries-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .entry-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    position: relative;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-time {
    font-size: 0.7rem;
    color: var(--warm2);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .entry-text {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
  }

  .entry-text.loading {
    color: var(--text-dim);
    font-style: italic;
  }

  /* 对话记录条目（念念 / 我 分块显示） */
  .conv-entry { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
  .conv-turn-model { background:rgba(232,168,87,0.08); border-left:3px solid var(--warm);
    padding:7px 11px; border-radius:0 8px 8px 0; }
  .conv-turn-user { background:rgba(255,255,255,0.04); border-left:3px solid rgba(255,255,255,0.18);
    padding:7px 11px; border-radius:0 8px 8px 0; }
  .conv-role { font-size:0.68rem; font-weight:600; opacity:0.5; display:block;
    margin-bottom:3px; letter-spacing:0.05em; }

  /* ===== Album 相册 ===== */
  .album-grid {
    display:grid; grid-template-columns:repeat(1,1fr); gap:10px;
    padding:12px 14px 80px; }
  @media (min-width:480px) {
    .album-grid { grid-template-columns:repeat(2,1fr); gap:12px; } }
  .album-card { position:relative; aspect-ratio:1; cursor:pointer;
    border-radius:16px; overflow:hidden;
    box-shadow:0 2px 12px rgba(0,0,0,0.25);
    transition:transform 0.18s, box-shadow 0.18s; }
  .album-card:active { transform:scale(0.97); }
  .album-card-inner {
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d; transition:transform 0.5s cubic-bezier(0.4,0,0.2,1); }
  .album-card.flipped .album-card-inner { transform:rotateY(180deg); }
  .album-card-front, .album-card-back {
    position:absolute; inset:0; border-radius:16px; overflow:hidden;
    backface-visibility:hidden; -webkit-backface-visibility:hidden; }
  .album-card-front img { width:100%; height:100%; object-fit:cover; display:block; }
  /* 正面渐变叠加：日期 + 标题始终可见 */
  .album-card-overlay {
    position:absolute; bottom:0; left:0; right:0; pointer-events:none;
    background:linear-gradient(transparent 30%, rgba(0,0,0,0.68));
    padding:28px 10px 10px; }
  .album-card-overlay-date {
    font-size:0.6rem; color:rgba(255,255,255,0.75); letter-spacing:0.1em; }
  .album-card-overlay-title {
    font-size:0.75rem; font-weight:600; color:#fff;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
  /* 点赞按钮 */
  .album-like-btn {
    position:absolute; top:8px; right:8px; z-index:5;
    width:30px; height:30px; border-radius:50%;
    background:rgba(0,0,0,0.32); backdrop-filter:blur(6px);
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:0.9rem; line-height:1; color:#fff;
    transition:transform 0.15s, background 0.2s; }
  .album-like-btn:active { transform:scale(1.35); }
  .album-like-btn.liked { background:rgba(220,50,50,0.82); }
  /* 翻面：总结信息 */
  .album-card-back {
    transform:rotateY(180deg);
    background:var(--bg2); border:1px solid rgba(232,168,87,0.25);
    padding:12px; display:flex; flex-direction:column; gap:5px; overflow:hidden; }
  .album-card-date { font-size:0.65rem; color:var(--warm); letter-spacing:0.1em; flex-shrink:0; }
  .album-card-title { font-size:0.8rem; font-weight:600; color:var(--text); flex-shrink:0; }
  .album-card-summary {
    font-size:0.7rem; line-height:1.55; color:var(--text-dim); flex:1; overflow:hidden; }
  .album-card-summary.clamped {
    display:-webkit-box; -webkit-line-clamp:5; -webkit-box-orient:vertical; overflow:hidden; }
  .album-expand-btn {
    flex-shrink:0; margin-top:2px; padding:2px 0; background:none; border:none; cursor:pointer;
    font-size:0.65rem; color:var(--warm); letter-spacing:0.03em; text-align:left; }
  /* 相册顶部筛选栏 */
  .album-toolbar {
    display:flex; align-items:center; gap:8px; padding:10px 14px 2px;
    font-size:0.75rem; color:var(--text-dim); }
  .album-filter-btn {
    padding:4px 10px; border-radius:20px; border:1px solid var(--border);
    background:none; color:var(--text-dim); font-size:0.72rem; cursor:pointer;
    transition:background 0.15s, color 0.15s, border-color 0.15s; }
  .album-filter-btn.active {
    background:var(--warm); color:#13100e; border-color:var(--warm); font-weight:600; }
  .album-count { margin-left:auto; font-size:0.7rem; color:var(--text-dim); }
  .album-empty { text-align:center; padding:60px 20px; color:var(--text-dim); font-size:0.88rem; grid-column:1/-1; }
  /* Album detail overlay */
  .album-detail-overlay {
    position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.6);
    display:flex; align-items:flex-end; backdrop-filter:blur(4px); }
  .album-detail-sheet {
    width:100%; max-height:80vh; background:var(--bg2); border-radius:20px 20px 0 0;
    padding:24px 20px 48px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; }
  .album-detail-img { width:100%; border-radius:12px; display:block; margin-bottom:4px; }
  .album-detail-date { font-size:0.72rem; color:var(--warm); letter-spacing:0.1em; }
  .album-detail-title { font-size:1rem; font-weight:700; color:var(--text); }
  .album-detail-text { font-size:0.88rem; line-height:1.9; color:var(--text-dim); white-space:pre-wrap; margin-top:4px; }
  .album-detail-translating { font-size:0.78rem; color:var(--warm); opacity:0.7; margin-top:4px; }
  .album-detail-close {
    margin-top:16px; padding:10px; background:rgba(255,255,255,0.07); border:none;
    border-radius:12px; color:var(--text-dim); font-size:0.88rem; cursor:pointer; width:100%; }

  .entry-delete {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 6px;
    border-radius: 8px;
    transition: all 0.15s;
    line-height: 1;
  }
  .entry-delete:hover { color: var(--red); background: rgba(212,96,74,0.1); }

  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: var(--text-dim);
    font-size: 0.85rem;
    line-height: 1.8;
    background: var(--bg2);
    border: 1px dashed var(--border);
    border-radius: 16px;
  }

  /* Summary */
  .summary-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--warm2), var(--warm));
    border: none;
    border-radius: 16px;
    color: var(--bg);
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .summary-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .summary-btn:active { transform: translateY(0); }
  .summary-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .summary-card {
    background: var(--bg2);
    border: 1px solid rgba(232,168,87,0.3);
    border-radius: 20px;
    padding: 20px;
    display: none;
    animation: slideIn 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--warm), transparent);
  }

  .summary-card.visible { display: block; }

  .summary-label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--warm);
    margin-bottom: 12px;
  }

  .summary-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--warm);
    margin-bottom: 10px;
  }

  .summary-text {
    font-size: 0.88rem;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
  }

  .copy-btn {
    margin-top: 14px;
    padding: 6px 16px;
    background: var(--warm-dim);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--warm);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Serif SC', serif;
  }
  .copy-btn:hover { background: rgba(232,168,87,0.2); }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: calc(49px + env(safe-area-inset-bottom, 0) + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 20px;
    font-size: 0.82rem;
    color: var(--text);
    transition: transform 0.3s ease;
    z-index: 150;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  #todayView { width: 100%; display: flex; flex-direction: column; align-items: center; }

  /* Calendar */
  .cal-nav { display:flex; justify-content:space-between; align-items:center; padding:4px 0 16px; }
  .cal-nav button { background:none; border:1px solid var(--border); color:var(--text-dim);
                    border-radius:12px; padding:6px 14px; cursor:pointer; font-size:1.1rem; }
  .cal-nav button:hover { color:var(--warm); border-color:var(--warm); }
  .cal-title { font-size:0.95rem; color:var(--text); letter-spacing:0.1em; }
  .cal-weekdays { display:grid; grid-template-columns:repeat(7,1fr); text-align:center;
                  font-size:0.68rem; color:var(--text-dim); margin-bottom:6px; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-day { aspect-ratio:1; display:flex; flex-direction:column; align-items:center;
             justify-content:center; border-radius:8px; cursor:pointer; font-size:0.82rem;
             color:var(--text); transition:background 0.15s, transform 0.15s;
             position:relative; overflow:hidden; user-select:none; -webkit-user-select:none; }
  .cal-day:hover { background:var(--warm-dim); transform:scale(1.08); z-index:1; }
  .cal-day.has-illus:hover .cal-day-img { transform:scale(1.1); transition:transform 0.15s; }
  .cal-day-img { transition:transform 0.15s; }
  .cal-day.has-entry { color:var(--warm); font-weight:500; }
  .cal-day.has-entry::after { content:'·'; display:block; font-size:1.2rem; line-height:0.4; color:var(--warm); }
  .cal-day.today { background:var(--warm-dim); }
  .cal-day.selected { background:var(--warm) !important; color:#13100e !important; }
  .cal-day.other-month { opacity:0.3; }
  /* Illustration thumbnail in calendar */
  .cal-day-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:8px; }
  .cal-day-num { position:relative; z-index:1; font-size:0.72rem; font-weight:700; line-height:1;
                 background:rgba(0,0,0,0.48); color:#fff; border-radius:4px; padding:2px 5px; }
  .cal-day.has-illus.has-entry::after { display:none; }
  .cal-day.has-illus.today::before,
  .cal-day.has-illus.selected::before { content:''; position:absolute; inset:0; border-radius:8px; z-index:0; }
  .cal-day.has-illus.today::before { background:rgba(232,168,87,0.35); }
  .cal-day.has-illus.selected::before { background:rgba(232,168,87,0.55); }
  .cal-day-panel { background:var(--bg2); border:1px solid var(--border); border-radius:20px;
                   padding:16px; margin-top:16px; animation:slideIn 0.3s ease; }

  /* Play button */
  .play-btn { background:none; border:none; color:var(--text-dim); cursor:pointer;
              font-size:0.78rem; padding:2px 8px; border-radius:8px; transition:all 0.15s; }
  .play-btn:hover { color:var(--warm); background:var(--warm-dim); }

  /* Hide button */
  .entry-hide { position:absolute; top:10px; right:36px; background:none; border:none;
                cursor:pointer; font-size:0.78rem; padding:2px 6px; border-radius:6px;
                color:var(--text-dim); transition:all 0.15s; }
  .entry-hide:hover { color:var(--text); background:var(--warm-dim); }
  .entry-hidden { color:var(--text-dim) !important; font-style:italic; letter-spacing:0.1em; }

  /* Export button */
  .export-btn { width:100%; margin-top:8px; padding:13px; background:var(--bg3);
                border:1px solid var(--border); color:var(--text-dim); border-radius:16px;
                cursor:pointer; font-family:'Noto Serif SC',serif; font-size:0.85rem; transition:all 0.2s; }
  .export-btn:hover { border-color:var(--warm); color:var(--warm); }

  /* Search */
  .search-bar { display:flex; align-items:center; gap:8px; width:100%; max-width:500px;
                padding:0 16px 12px; box-sizing:border-box; }
  .search-bar input { flex:1; background:var(--bg2); border:1px solid var(--border);
                      border-radius:20px; padding:8px 16px; color:var(--text);
                      font-size:0.9rem; font-family:'Noto Serif SC',serif; outline:none;
                      transition:border-color 0.2s; }
  .search-bar input:focus { border-color:var(--warm); }
  .search-bar input::placeholder { color:var(--text-dim); }
  .search-close { background:none; border:none; color:var(--text-dim); font-size:1rem;
                  cursor:pointer; padding:4px 8px; border-radius:10px; transition:all 0.2s; }
  .search-close:hover { color:var(--warm); }
  /* ===== Gemini Live 对话区 ===== */
  .conversation-area {
    display: none; flex-direction: column; gap: 10px;
    max-height: 44vh; overflow-y: auto; width: 100%; padding: 2px 0 4px;
    scroll-behavior: smooth;
  }
  .conversation-area.active { display: flex; }
  .chat-bubble {
    max-width: 82%; padding: 10px 14px; border-radius: 18px;
    font-size: 0.87rem; line-height: 1.65; animation: slideIn 0.2s ease;
    word-break: break-all;
  }
  .chat-bubble.user {
    align-self: flex-end; background: var(--warm-dim);
    border: 1px solid rgba(232,168,87,0.25); color: var(--text);
    border-bottom-right-radius: 4px;
  }
  .chat-bubble.model {
    align-self: flex-start; background: var(--bg2);
    border: 1px solid var(--border); color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .chat-bubble.partial { opacity: 0.55; font-style: italic; }
  .chat-name {
    font-size: 0.65rem; color: var(--text-dim); margin-bottom: 3px;
    letter-spacing: 0.05em;
  }
  /* 念念说话时的波形动画 */
  .speaking-wave {
    display: none; align-items: center; gap: 3px; height: 22px;
    padding-left: 4px;
  }
  .speaking-wave.active { display: flex; }
  .speaking-wave span {
    width: 3px; min-height: 4px; background: var(--warm); border-radius: 3px;
    animation: wave 0.9s ease-in-out infinite;
  }
  .speaking-wave span:nth-child(2) { animation-delay: 0.12s; }
  .speaking-wave span:nth-child(3) { animation-delay: 0.24s; }
  .speaking-wave span:nth-child(4) { animation-delay: 0.36s; }
  .speaking-wave span:nth-child(5) { animation-delay: 0.48s; }
  @keyframes wave {
    0%, 100% { height: 4px; } 50% { height: 18px; }
  }
  /* 结束对话按钮 */
  .end-conv-btn {
    display: none; width: 100%; padding: 13px;
    background: rgba(212,96,74,0.1); border: 1px solid rgba(212,96,74,0.3);
    border-radius: 16px; color: var(--red); font-size: 0.88rem;
    cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, 'PingFang SC', sans-serif;
  }
  .end-conv-btn.active { display: block; }
  .end-conv-btn:active { background: rgba(212,96,74,0.2); }
  /* 补录日期 banner */
  .date-banner {
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(232,168,87,0.12); border:1px solid rgba(232,168,87,0.4);
    border-radius:14px; padding:10px 14px; margin-bottom:10px;
  }

  // IndexedDB for audio + illustration storage
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('voice-diary-audio', 2);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('audio')) db.createObjectStore('audio');
        if (!db.objectStoreNames.contains('illus')) db.createObjectStore('illus');
      };
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = reject;
    });
  }
  async function saveAudio(id, blob) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('audio', 'readwrite');
      tx.objectStore('audio').put(blob, id);
      tx.oncomplete = resolve; tx.onerror = reject;
    });
  }
  async function getAudio(id) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('audio', 'readonly');
      const req = tx.objectStore('audio').get(id);
      req.onsuccess = e => resolve(e.target.result); req.onerror = reject;
    });
  }
  async function deleteAudio(id) {
    const db = await openDB();
    const tx = db.transaction('audio', 'readwrite');
    tx.objectStore('audio').delete(id);
  }
  async function saveIllus(dateStr, dataUrl) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('illus', 'readwrite');
      tx.objectStore('illus').put(dataUrl, dateStr);
      tx.oncomplete = resolve; tx.onerror = reject;
    });
  }
  async function getIllus(dateStr) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('illus', 'readonly');
      const req = tx.objectStore('illus').get(dateStr);
      req.onsuccess = e => resolve(e.target.result); req.onerror = reject;
    });
  }
  async function getAllIllus() {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('illus', 'readonly');
      const result = [];
      tx.objectStore('illus').openCursor().onsuccess = e => {
        const c = e.target.result;
        if (c) { result.push({ dateStr: c.key, dataUrl: c.value }); c.continue(); }
        else resolve(result);
      };
      tx.onerror = reject;
    });
  }

  async function playAudio(id) {
    // If this entry is playing, pause it
    if (currentPlayId === id && currentAudio) {
      currentAudio.pause();
      currentAudio = null;
      currentPlayId = null;
      setPlayBtn(id, false);
      return;
    }
    // Stop any other playing audio
    if (currentAudio) {
      currentAudio.pause();
      URL.revokeObjectURL(currentAudio.src);
      setPlayBtn(currentPlayId, false);
      currentAudio = null;
      currentPlayId = null;
    }
    const blob = await getAudio(id);
    if (!blob) { showToast(t('noAudio')); return; }
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => {
      URL.revokeObjectURL(url);
      setPlayBtn(id, false);
      currentAudio = null;
      currentPlayId = null;
    };
    audio.play();
    currentAudio = audio;
    currentPlayId = id;
    setPlayBtn(id, true);
  }

  // ===== Gemini Live 对话函数 =====

  async function startConversation() {
    if (convActive) return;
    convActive = true;
    partialEls = {};
    document.getElementById('convArea').innerHTML = '';
    document.getElementById('convArea').classList.add('active');
    document.getElementById('endConvBtn').classList.add('active');
    document.getElementById('recordBtn').classList.add('recording');
    document.getElementById('recordHint').textContent = t('connecting');
    document.getElementById('recordBtn').disabled = true;

    // 连接期间每秒更新等待秒数，让用户知道正在进行中（Gemini 模型初始化通常需要 10-30s）
    let connSecs = 0;
    const connPhases = [t('connecting'), t('connecting2'), t('connecting3')];
    connectMsgTimer = setInterval(() => {
      connSecs++;
      const phase = connSecs < 8 ? connPhases[0] : connSecs < 18 ? connPhases[1] : connPhases[2];
      const hint = document.getElementById('recordHint');
      if (hint && convActive && !captureCtx) hint.textContent = `${phase} (${connSecs}s)`;
    }, 1000);

    // iOS 媒体声道解锁（让硬件音量键生效）
    try {
      const _sil = document.createElement('audio');
      _sil.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
      _sil.setAttribute('playsinline', '');
      await _sil.play();
    } catch(e) {}

    // 在用户手势内同步创建 playbackCtx（iOS Safari 要求）
    // 不能等到 ready 消息时再创建，否则已脱离手势上下文，AudioContext 会被挂起
    if (!playbackCtx) {
      playbackCtx = new AudioContext({ sampleRate: 24000 });
      masterGain = playbackCtx.createGain();
      masterGain.connect(playbackCtx.destination);
      nextPlayTime = 0;
    }
    if (playbackCtx.state === 'suspended') await playbackCtx.resume();

    // 35s 连接超时：若未收到 ready 则重置并提示重试
    connectTimer = setTimeout(() => {
      if (convActive && !captureCtx) {
        resetConvUI();
        document.getElementById('recordHint').innerHTML =
          `<span style="color:var(--red)">${t('connFail')}</span><br>` +
          `<span style="font-size:0.75rem;opacity:0.6">${t('connSlow')}</span>`;
      }
    }, 35000);

    liveWs = new WebSocket(WS_URL + '?lang=' + currentLang);
    liveWs.onopen = () => {
      const todayStr = getActiveDateStr();
      const todayTime = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const recentEntries = entries
        .filter(e => !e.hidden && !e.loading)
        .sort((a, b) => b.id - a.id)
        .slice(0, 8)
        .map(e => ({ date: e.date, time: e.time, text: e.text.substring(0, 200) }));
      const todaySummary = summaries[todayStr] || null;
      liveWs.send(JSON.stringify({
        type: 'start',
        lang: currentLang,
        context: { today: todayStr, todayTime, timezone, recentEntries, todaySummary }
      }));
    };
    liveWs.onmessage = handleLiveMessage;
    liveWs.onerror = () => { showToast(t('connFail')); resetConvUI(); };
    liveWs.onclose = () => { if (convActive) resetConvUI(); };
  }

  async function handleLiveMessage(event) {
    const msg = JSON.parse(event.data);

    if (msg.type === 'ready') {
      clearTimeout(connectTimer); connectTimer = null;
      clearInterval(connectMsgTimer); connectMsgTimer = null;
      // 开始麦克风采集（PCM 16kHz）
      // iOS Safari: don't specify exact sampleRate in getUserMedia (causes OverconstrainedError)
      // iOS Safari: AudioContext ignores sampleRate hint, use native rate + downsample in worklet
      try {
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: { ideal: 1 }, echoCancellation: true, noiseSuppression: true }
        });
        captureCtx = new AudioContext();
        if (captureCtx.state === 'suspended') await captureCtx.resume();
        // Use real file URL instead of Blob URL — iOS Safari can't load AudioWorklet from Blob
        await captureCtx.audioWorklet.addModule('/worklet.js');

        const source = captureCtx.createMediaStreamSource(micStream);
        // Pass targetRate so worklet can downsample from native (e.g. 44100) to 16000
        workletNode = new AudioWorkletNode(captureCtx, 'pcm-proc', {
          processorOptions: { targetRate: 16000 }
        });
        workletNode.port.onmessage = (e) => {
          if (liveWs?.readyState !== 1) return;
          // 客户端 VAD：连续 N 帧超过阈值才打断（防回声/噪音误触）
          if (modelSpeaking && !userBargedIn) {
            // 客户端 VAD 检测用户说话（模型说话时不发送音频给 Gemini，避免回声干扰）
            const samples = new Int16Array(e.data);
            let sum = 0;
            for (let i = 0; i < samples.length; i++) sum += samples[i] * samples[i];
            if (Math.sqrt(sum / samples.length) > VAD_THRESHOLD) {
              if (++vadFrameCount >= VAD_FRAMES_REQUIRED) {
                stopPlayback();
                modelSpeaking = false;
                userBargedIn = true;
                vadFrameCount = 0;
                // 向服务器发送打断信号，让 Gemini 立即停止生成
                if (liveWs?.readyState === 1)
                  liveWs.send(JSON.stringify({ type: 'interrupt' }));
                clearTimeout(bargeInTimer);
                bargeInTimer = setTimeout(() => { userBargedIn = false; bargeInTimer = null; }, 15000);
              }
            } else {
              vadFrameCount = 0;
            }
            return; // 模型说话期间屏蔽麦克风回声，不发送给 Gemini
          }
          // 问候语阶段（念念还未完成第一句话前）不发音频给 Gemini，防止启动竞态窗口误触 VAD
          if (!modelHasSpoken) return;
          const bytes = new Uint8Array(e.data);
          let str = ''; for (let i = 0; i < bytes.length; i++) str += String.fromCharCode(bytes[i]);
          const b64 = btoa(str);
          liveWs.send(JSON.stringify({ type: 'audio', data: b64 }));
          // 首次发送时启动超时计时器（必须等念念完成首次回复后才启动，防止截断问候语）
          if (!audioSendStart && !modelSpeaking && modelHasSpoken && !userBargedIn) {
            audioSendStart = Date.now();
            forceEndTimer = setTimeout(() => {
              if (liveWs?.readyState === 1) {
                liveWs.send(JSON.stringify({ type: 'forceEndTurn' }));
              }
              audioSendStart = null;
              forceEndTimer = null;
            }, 15000);
          }
        };
        source.connect(workletNode);

        // playbackCtx 已在 startConversation() 的用户手势内创建，这里只确保未被挂起
        if (playbackCtx?.state === 'suspended') await playbackCtx.resume();

        document.getElementById('recordBtn').disabled = false;
        document.getElementById('recordHint').textContent = t('greeting');
      } catch (e) {
        showToast(t('micFail'));
        endConversation();
      }

    } else if (msg.type === 'audio') {
      if (userBargedIn) return;  // 用户已打断，忽略剩余模型音频
      vadFrameCount = 0;  // 模型开始新音频，重置帧计数器
      // 播放 Gemini 语音（PCM 24kHz）
      playPCMChunk(msg.data, 24000);
      // 收集念念语音 PCM 数据，供对话结束后保存
      { const bin = atob(msg.data); const raw = new Int16Array(bin.length / 2);
        for (let i = 0; i < raw.length; i++) raw[i] = (bin.charCodeAt(i*2) | (bin.charCodeAt(i*2+1) << 8));
        convModelPCM.push(raw); }
      document.getElementById('speakWave').classList.add('active');
      // 模型开始回应：确认待定的用户气泡（turn-user 可能还未到达）
      if (partialEls['user']) {
        partialEls['user'].bubble.classList.remove('partial');
        partialEls['user'] = null;
      }
      modelSpeaking = true;
      clearTimeout(forceEndTimer); forceEndTimer = null; audioSendStart = null;

    } else if (msg.type === 'partial') {
      // 用户开口时重置模型气泡合并状态
      if (msg.role === 'user') {
        lastModelBubble = null;
        lastModelTextPrefix = '';
      }
      updatePartialBubble(msg.role, msg.text);
      // 模型开始转录，重置计时器
      if (msg.role === 'model') {
        clearTimeout(forceEndTimer); forceEndTimer = null; audioSendStart = null;
      }

    } else if (msg.type === 'turn') {
      finalizeBubble(msg.role, msg.text);
      if (msg.role === 'user') {
        // VAD 已触发，用户轮次完成 → 停止 forceEnd 计时器（等模型自然回应）
        clearTimeout(forceEndTimer); forceEndTimer = null; audioSendStart = null;
        // 用户说完话，重置模型气泡合并状态（下一段模型回复是全新气泡）
        lastModelBubble = null;
        lastModelTextPrefix = '';
      }
      if (msg.role === 'model') {
        modelSpeaking = false;
        userBargedIn = false;
        clearTimeout(bargeInTimer); bargeInTimer = null;
        modelHasSpoken = true;  // 念念完成首次回复，此后允许启动 forceEnd 计时器
        document.getElementById('speakWave').classList.remove('active');
        // 念念说完第一句后，提示用户可以开口
        const hint = document.getElementById('recordHint');
        if (hint.textContent === t('greeting')) {
          hint.textContent = t('convActive');
        }
      }

    } else if (msg.type === 'save_note') {
      const id = Date.now();
      const timeStr = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      entries.push({ id, date: getActiveDateStr(), time: timeStr, text: '📌 ' + msg.text, loading: false });
      saveEntries();
      renderEntries();
      showToast(t('noteToast'));

    } else if (msg.type === 'done') {
      finishConversation(msg.transcript);

    } else if (msg.type === 'error') {
      showToast(t('convErr') + (msg.message || '未知错误'));
      resetConvUI();
    }
  }

  function updatePartialBubble(role, text) {
    const area = document.getElementById('convArea');
    if (!partialEls[role]) {
      if (role === 'model' && lastModelBubble) {
        // Gemini 中途触发 turnComplete 后继续说话：复用上一个气泡，追加新内容
        lastModelBubble.classList.add('partial');
        partialEls['model'] = { wrap: lastModelBubble.parentElement, bubble: lastModelBubble };
      } else {
        const wrap = document.createElement('div');
        const name = document.createElement('div');
        name.className = 'chat-name';
        name.textContent = role === 'user' ? t('me') : t('niannian');
        const bubble = document.createElement('div');
        bubble.className = `chat-bubble ${role} partial`;
        wrap.appendChild(name);
        wrap.appendChild(bubble);
        area.appendChild(wrap);
        partialEls[role] = { wrap, bubble };
      }
    }
    partialEls[role].bubble.textContent = lastModelTextPrefix + text;
    area.scrollTop = area.scrollHeight;
  }

  function finalizeBubble(role, text) {
    if (partialEls[role]) {
      partialEls[role].bubble.classList.remove('partial');
      partialEls[role].bubble.textContent = lastModelTextPrefix + text;
      if (role === 'model') {
        // 保存气泡引用，若 Gemini 继续说话可追加到同一气泡
        lastModelBubble = partialEls[role].bubble;
        lastModelTextPrefix = lastModelTextPrefix + text + ' ';
      }
      partialEls[role] = null;
    }
    // 无 partialEls 说明已被 type:'audio' 处理器提前完成，跳过避免重复气泡
  }

      const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const turns = transcript.map(item => {

  // 将念念 PCM 数据编码为 WAV Blob（纯 JS，无需外部库）
  function encodeWAV(chunks, sampleRate) {
    const totalLen = chunks.reduce((n, c) => n + c.length, 0);
    const pcm = new Int16Array(totalLen);
    let offset = 0;
    for (const c of chunks) { pcm.set(c, offset); offset += c.length; }
    const dataLen = pcm.byteLength;
    const buf = new ArrayBuffer(44 + dataLen);
    const v = new DataView(buf);
    const s = (o, t) => { for (let i = 0; i < t.length; i++) v.setUint8(o+i, t.charCodeAt(i)); };
    s(0, 'RIFF'); v.setUint32(4, 36 + dataLen, true);
    s(8, 'WAVE'); s(12, 'fmt ');
    v.setUint32(16, 16, true); v.setUint16(20, 1, true);
    v.setUint16(22, 1, true); v.setUint32(24, sampleRate, true);
    v.setUint32(28, sampleRate * 2, true); v.setUint16(32, 2, true);
    v.setUint16(34, 16, true); s(36, 'data');
    v.setUint32(40, dataLen, true);
    new Int16Array(buf, 44).set(pcm);
    return new Blob([buf], { type: 'audio/wav' });
  }

  // 立即停止 agent 语音播放（用户打断时调用）
  // 保留 AudioContext 以避免 iOS 重新创建时的挂起问题，只静音 + 重置调度时间
  function stopPlayback() {
    if (masterGain && playbackCtx) {
      masterGain.gain.cancelScheduledValues(playbackCtx.currentTime);
      masterGain.gain.setValueAtTime(0, playbackCtx.currentTime);
    }
    // 停止所有已排队的 AudioBufferSourceNode，防止恢复 gain 后旧音频 bleed-through
    for (const src of activeSources) {
      try { src.stop(); } catch {}
    }
    activeSources = [];
    nextPlayTime = 0;
    document.getElementById('speakWave').classList.remove('active');
  }

// PCM 音频播放（Int16 24kHz → AudioContext 排队播放）
  function playPCMChunk(b64, sampleRate) {
    if (!playbackCtx) {
      playbackCtx = new AudioContext({ sampleRate });
      masterGain = playbackCtx.createGain();
      masterGain.connect(playbackCtx.destination);
      nextPlayTime = 0;
    }
    // 恢复增益（可能被 stopPlayback 静音过）
    if (masterGain.gain.value === 0) {
      masterGain.gain.cancelScheduledValues(playbackCtx.currentTime);
      masterGain.gain.setValueAtTime(1, playbackCtx.currentTime);
    }
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const samples = new Int16Array(bytes.buffer);
    const f32 = new Float32Array(samples.length);
    for (let i = 0; i < samples.length; i++) f32[i] = samples[i] / 32768;
    const buf = playbackCtx.createBuffer(1, f32.length, sampleRate);
    buf.getChannelData(0).set(f32);
    const src = playbackCtx.createBufferSource();
    src.buffer = buf;
    src.connect(masterGain);
    const startAt = Math.max(playbackCtx.currentTime, nextPlayTime);
    src.start(startAt);
    activeSources.push(src);
    src.onended = () => {
      src.disconnect();
      activeSources = activeSources.filter(s => s !== src);
    };
    nextPlayTime = startAt + buf.duration;
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];

      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : MediaRecorder.isTypeSupported('audio/webm')
        ? 'audio/webm'
        : 'audio/mp4';

      mediaRecorder = new MediaRecorder(stream, { mimeType });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        processAudio(mimeType);
      };
      mediaRecorder.start(100);

      isRecording = true;
      secondsElapsed = 0;
      document.getElementById('recordBtn').classList.add('recording');
      document.getElementById('timer').classList.add('visible');
      document.getElementById('recordHint').textContent = t('recording');

      timerInterval = setInterval(() => {
        secondsElapsed++;
        const m = Math.floor(secondsElapsed / 60);
        const s = secondsElapsed % 60;
        document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
      }, 1000);

    } catch(e) {
      showToast(t('micFail'));
    }
  }

  function stopRecording() {
    if (mediaRecorder) mediaRecorder.stop();
    isRecording = false;
    clearInterval(timerInterval);
    document.getElementById('recordBtn').classList.remove('recording');
    document.getElementById('timer').classList.remove('visible');
    document.getElementById('recordHint').innerHTML = t('transcribing');
  }

  async function processAudio(mimeType) {
    transcribing = true;
    document.getElementById('recordBtn').disabled = true;
    const blob = new Blob(audioChunks, { type: mimeType });

    const id = Date.now();
    const timeStr = new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
    entries.push({ id, date: getActiveDateStr(), time: timeStr, text: '', loading: true });
    renderEntries();

    try {
      const formData = new FormData();
      formData.append('audio', blob, 'recording.' + (mimeType.includes('mp4') ? 'm4a' : 'webm'));
      const res = await fetch('/api/transcribe', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.text) {
        const entry = entries.find(e => e.id === id);
        if (entry) { entry.text = data.text; entry.loading = false; entry.hasAudio = true; }
        saveAudio(id, blob);
      } else {
        entries = entries.filter(e => e.id !== id);
        showToast(t('transcribeFail'));
      }
    } catch(e) {
      entries = entries.filter(e => e.id !== id);
      showToast(t('netFail'));
    }

    saveEntries();
    renderEntries();
    transcribing = false;
    document.getElementById('recordBtn').disabled = false;
    document.getElementById('recordHint').innerHTML = t('recordHintDone') + '<br><span style="font-size:0.75rem;opacity:0.6">' + t('recordHintDoneSub') + '</span>';
  }

  // Summary
  async function generateSummary() {
    const btn = document.getElementById('summaryBtn');
    const card = document.getElementById('summaryCard');
    const text = document.getElementById('summaryText');

    const activeDateStr = getActiveDateStr();
    const todayEntries = entries.filter(e => e.date === activeDateStr && !e.loading && e.text && !e.hidden);
    if (todayEntries.length === 0) return;

    btn.disabled = true;
    btn.innerHTML = t('summarizing');
    card.classList.remove('visible');

    try {
      const res = await fetch('/api/summarize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ entries: todayEntries, lang: currentLang })
      });
      const data = await res.json();
      if (res.status === 429) { showToast(t('rateLimited')); return; }
      if (data.summary) {
        const today = activeDateStr;
        titles[today] = data.title || '';
        localStorage.setItem('vd_titles', JSON.stringify(titles));
        summaries[today] = data.summary;
        localStorage.setItem('vd_summaries', JSON.stringify(summaries));
        document.getElementById('summaryTitle').textContent = data.title || '';
        text.textContent = data.summary;
        card.classList.add('visible');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } else {
        showToast(t('genFail'));
      }
    } catch(e) {
      showToast(t('netFail'));
    }

    btn.disabled = false;
    btn.innerHTML = t('regen');
  }

  function performSearch(query) {
    const results = document.getElementById('searchResults');
    if (!query.trim()) { results.style.display = 'none'; return; }
    const matched = entries.filter(e => !e.loading && e.text && !e.hidden && e.text.includes(query));
    if (matched.length === 0) {
      results.innerHTML = `<div style="color:var(--text-dim);padding:12px 0;font-size:0.88rem">${t('searchEmpty')}</div>`;
      results.style.display = '';
      return;
    }
    const byDate = {};
    for (const e of matched) {
      if (!byDate[e.date]) byDate[e.date] = [];
      byDate[e.date].push(e);
    }
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    results.innerHTML = Object.keys(byDate).sort().reverse().map(date => `
      <div style="margin-bottom:16px">
        <div class="summary-label" style="margin-bottom:8px">${date}</div>
        ${byDate[date].map(e => `
          <div class="entry-card" style="animation:none">
            <div class="entry-time">${e.time}</div>
            <div class="entry-text">${e.text.replace(new RegExp(escaped, 'g'), m => `<mark style="background:var(--warm-dim);color:var(--warm);border-radius:3px">${m}</mark>`)}</div>
          </div>`).join('')}
      </div>`).join('');
    results.innerHTML = `<div style="color:var(--text-dim);font-size:0.78rem;margin-bottom:12px">${t('searchFound')} ${matched.length} ${t('searchFoundSuffix')}</div>` + results.innerHTML;
    results.style.display = '';
  }

  function isChinese(text) { return /[\u4e00-\u9fff]/.test(text); }

  async function getTranslated(dateStr, text, targetLang) {
    if (!text) return text;
    const cacheKey = `${dateStr}|${targetLang}`;
    if (translations[cacheKey]) return translations[cacheKey];
    try {
      const res = await fetch('/api/translate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, targetLang })
      });
      const data = await res.json();
      if (data.text) {
        translations[cacheKey] = data.text;
        localStorage.setItem('vd_translations', JSON.stringify(translations));
        return data.text;
      }
    } catch {}
    return text;
  }

      (currentLang === 'en' && isChinese(summaryText)) ||
      (currentLang === 'zh' && !isChinese(summaryText) && summaryText !== '暂无总结' && summaryText !== 'No summary yet')
    );
    const cacheKey = `${dateStr}|${currentLang}`;
    if (translations[cacheKey]) {

  async function renderAlbum() {
    const grid = document.getElementById('albumGrid');
    grid.innerHTML = '';
    const all = await getAllIllus();
    all.sort((a, b) => b.dateStr.localeCompare(a.dateStr));
    const filtered = albumFilter === 'liked' ? all.filter(x => likes[x.dateStr]) : all;

    const countEl = document.getElementById('albumCount');
    if (countEl) countEl.textContent = filtered.length ? `${filtered.length} ${currentLang === 'en' ? 'photos' : '张'}` : '';

    if (!filtered.length) {
      grid.innerHTML = `<div class="album-empty">${albumFilter === 'liked' ? t('albumNoLiked') : t('albumEmpty')}</div>`;
      return;
    }
    const locale = currentLang === 'en' ? 'en-US' : 'zh-CN';
    for (const { dateStr, dataUrl } of filtered) {
      const summary = summaries[dateStr] || '';
      const title = titles[dateStr] || '';
      const dateLabel = (() => {
        try { return new Date(dateStr.replace(/\//g, '-') + 'T12:00:00').toLocaleDateString(locale, { month:'long', day:'numeric' }); }
        catch { return dateStr; }
      })();
      const summaryText = summary || (currentLang === 'en' ? 'No summary yet' : '暂无总结');
      const cacheKey = `${dateStr}|${currentLang}`;
      const displayText = translations[cacheKey] || summaryText;
      const isLiked = !!likes[dateStr];

      const safeId = dateStr.replace(/[^a-z0-9]/gi, '');
      const card = document.createElement('div');
      card.className = 'album-card';
      card.innerHTML = `
        <div class="album-card-inner">
          <div class="album-card-front">
            <img src="${dataUrl}" alt="${dateStr}">
            <div class="album-card-overlay">
              <div class="album-card-overlay-date">${dateLabel}</div>
              ${title ? `<div id="album-ot-${safeId}" class="album-card-overlay-title">${title}</div>` : ''}
            </div>
          </div>
          <div class="album-card-back">
            <div class="album-card-date">${dateLabel}</div>
            ${title ? `<div id="album-bt-${safeId}" class="album-card-title">${title}</div>` : ''}
            <div class="album-card-summary clamped">${displayText}</div>
            <button class="album-expand-btn">${t('expandBtn')}</button>
          </div>
        </div>
        <button class="album-like-btn${isLiked ? ' liked' : ''}">${isLiked ? '♥' : '♡'}</button>`;
      card.onclick = () => card.classList.toggle('flipped');
      card.querySelector('.album-expand-btn').onclick = e => {
        e.stopPropagation();
        openAlbumDetail(dateLabel, title, dataUrl, summaryText, dateStr);
      };
      card.querySelector('.album-like-btn').onclick = e => toggleLike(dateStr, e.currentTarget, e);
      grid.appendChild(card);
      // 翻译标题（切换到英文时）
      if (title && currentLang === 'en') {
        getTranslated('title_' + dateStr, title, 'en').then(tx => {
          if (tx === title) return;
          const ot = document.getElementById('album-ot-' + safeId);
          const bt = document.getElementById('album-bt-' + safeId);
          if (ot) ot.textContent = tx;
          if (bt) bt.textContent = tx;
        });
      }
    }
  }

  // Calendar
  function changeMonth(delta) {
    calMonth += delta;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0) { calMonth = 11; calYear--; }
    calSelected = null;
    document.getElementById('calDayPanel').style.display = 'none';
    renderCalendar();
  }

  async function renderCalendar() {
    const today = getTodayStr();
    const datesWithEntries = new Set(entries.filter(e => !e.loading).map(e => e.date));

    // Load illustrations for this month
    const allIllus = await getAllIllus();
    const illusMap = {};
    for (const { dateStr, dataUrl } of allIllus) {
      illusMap[dateStr.replace(/\//g, '-')] = dataUrl;
    }

    const calLocale = currentLang === 'en' ? 'en-US' : 'zh-CN';
    document.getElementById('calTitle').textContent =
      new Date(calYear, calMonth, 1).toLocaleDateString(calLocale, { year:'numeric', month:'long' });

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const daysInPrev = new Date(calYear, calMonth, 0).getDate();

    // Previous month padding
    for (let i = firstDay - 1; i >= 0; i--) {
      const d = document.createElement('div');
      d.className = 'cal-day other-month';
      d.textContent = daysInPrev - i;
      grid.appendChild(d);
    }

    // Current month days
    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = new Date(calYear, calMonth, day)
        .toLocaleDateString(currentLang === 'en' ? 'en-CA' : 'zh-CN', { year:'numeric', month:'2-digit', day:'2-digit' });
      const normalizedDate = dateStr.replace(/\//g, '-');
      const illusUrl = illusMap[normalizedDate];
      const d = document.createElement('div');
      d.className = 'cal-day';
      if (illusUrl) {
        d.classList.add('has-illus');
        const img = document.createElement('img');
        img.className = 'cal-day-img';
        img.src = illusUrl;
        img.alt = '';
        d.appendChild(img);
        const num = document.createElement('span');
        num.className = 'cal-day-num';
        num.textContent = day;
        d.appendChild(num);
      } else {
        d.textContent = day;
      }
      if (dateStr === today) d.classList.add('today');
      if (datesWithEntries.has(dateStr)) d.classList.add('has-entry');
      if (dateStr === calSelected) d.classList.add('selected');
      d.onclick = () => selectDay(dateStr, d);
      grid.appendChild(d);
    }

    // Next month padding
    const totalCells = firstDay + daysInMonth;
    const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let i = 1; i <= remaining; i++) {
      const d = document.createElement('div');
      d.className = 'cal-day other-month';
      d.textContent = i;
      grid.appendChild(d);
    }
  }

  async function selectDay(dateStr, el) {
    calSelected = dateStr;
    document.querySelectorAll('.cal-day.selected').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');

    // 归一化日期格式（斜杠↔短横线），兼容补录条目与原始条目
    const normDate = dateStr.replace(/\//g, '-');
    const altDate  = dateStr.replace(/-/g, '/');

    const dayEntries = entries.filter(e => e.date.replace(/\//g, '-') === normDate && !e.loading);
    const panel = document.getElementById('calDayPanel');
    const title = document.getElementById('calDayTitle');
    const list = document.getElementById('calDayEntries');

    title.textContent = dateStr;
    list.innerHTML = '';

    if (dayEntries.length === 0) {
      list.innerHTML = `<div style="color:var(--text-dim);font-size:0.85rem;padding:8px 0">${t('noRecord')}</div>`;
    } else {
      dayEntries.forEach(entry => {
        const card = document.createElement('div');
        card.className = 'entry-card';
        card.style.animation = 'none';
        card.innerHTML = `
          <div class="entry-time">${entry.time}${entry.hasAudio ? ` <button class="play-btn" data-id="${entry.id}" onclick="playAudio(${entry.id})" title="${t('playHint')}">▶</button>` : ''}</div>
          <div class="entry-text">${entry.text}</div>
        `;
        list.appendChild(card);
      });
    }

    // Summary section
    // 用斜杠和短横线两种格式都尝试，兼容不同语言模式下保存的总结
    const summaryDiv = document.createElement('div');
    summaryDiv.style.marginTop = '16px';
    const existingSummary = summaries[dateStr] || summaries[normDate] || summaries[altDate];
    const existingTitle   = titles[dateStr]    || titles[normDate]    || titles[altDate];
    if (existingSummary) {
      const needsTrans = (currentLang === 'en' && isChinese(existingSummary)) ||
                         (currentLang === 'zh' && !isChinese(existingSummary));
      summaryDiv.innerHTML = `
        <div class="summary-label" style="margin-bottom:8px">${t('daySum')}</div>
        ${existingTitle ? `<div style="font-size:1rem;font-weight:600;color:var(--warm);margin-bottom:8px">${existingTitle}</div>` : ''}
        <div id="calDaySummaryText" style="font-size:0.85rem;line-height:1.8;color:var(--text);white-space:pre-wrap">${needsTrans ? t('translating') : existingSummary}</div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="copy-btn" style="margin-top:0" onclick="generateSummaryForDate('${normDate}')">${t('regenSum')}</button>
          <button class="copy-btn" style="margin-top:0" onclick="generateIllus('${normDate}')">${t('illusBtn')}</button>
        </div>`;
      if (needsTrans) {
        getTranslated(normDate, existingSummary, currentLang).then(tx => {
          const el = document.getElementById('calDaySummaryText');
          if (el) el.textContent = tx || existingSummary;
        });
      }
    } else if (dayEntries.length > 0) {
      summaryDiv.innerHTML = `
        <button class="copy-btn" style="margin-top:0" onclick="generateSummaryForDate('${normDate}')">${t('genSum')}</button>`;
    }
    list.appendChild(summaryDiv);

    // Illustration (load from IndexedDB if exists)
    const illusData = await getIllus(dateStr);
    if (illusData) {
      const imgDiv = document.createElement('div');
      imgDiv.style.marginTop = '12px';
      imgDiv.innerHTML = `<img src="${illusData}" style="width:100%;border-radius:12px;display:block">`;
      list.appendChild(imgDiv);
    }

    // 补录按钮
    const addBtn = document.createElement('button');
    addBtn.className = 'copy-btn';
    addBtn.style.cssText = 'margin-top:12px;width:100%';
    addBtn.textContent = t('addEntryBtn');
    addBtn.onclick = () => openDayEditor(normDate);
    list.appendChild(addBtn);

    panel.style.display = '';
    panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }

  // Generate summary for any date (used from calendar view)
  async function generateSummaryForDate(dateStr) {
    const normD = dateStr.replace(/\//g, '-');
    const dateEntries = entries.filter(e => e.date.replace(/\//g, '-') === normD && !e.loading && e.text && !e.hidden);
    if (!dateEntries.length) { showToast(t('noRecordForSum')); return; }
    showToast(t('sumGenerating'));
    try {
      const res = await fetch('/api/summarize', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ entries: dateEntries, lang: currentLang })
      });
      const data = await res.json();
      if (res.status === 429) { showToast(t('rateLimited')); return; }
      if (data.summary) {
        titles[dateStr] = data.title || '';
        localStorage.setItem('vd_titles', JSON.stringify(titles));
        summaries[dateStr] = data.summary;
        localStorage.setItem('vd_summaries', JSON.stringify(summaries));
        const sel = document.querySelector('.cal-day.selected');
        if (sel && calSelected === dateStr) selectDay(dateStr, sel);
        if (dateStr === getActiveDateStr()) {
          document.getElementById('summaryTitle').textContent = data.title || '';
          document.getElementById('summaryText').textContent = data.summary;
          document.getElementById('summaryCard').classList.add('visible');
        }
      } else { showToast(t('genFail')); }
    } catch(e) { showToast(t('netFail')); }
  }

  // Generate illustration for any date
  async function generateIllus(dateStr) {
    dateStr = dateStr || getActiveDateStr();
    const dateEntries = entries.filter(e => e.date === dateStr && !e.loading && e.text && !e.hidden);
    const summary = summaries[dateStr] || '';
    if (!dateEntries.length && !summary) { showToast(t('illusNeedContent')); return; }
    showToast(t('illusGeneratingLong'));
    try {
      const res = await fetch('/api/illustrate', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ entries: dateEntries, summary })
      });
      const data = await res.json();
      if (data.imageData) {
        await saveIllus(dateStr, data.imageData);
        if (dateStr === getActiveDateStr()) {
          const area = document.getElementById('illustrationArea');
          if (area) area.innerHTML = `<img src="${data.imageData}" style="width:100%;border-radius:12px;margin-top:4px;display:block">`;
        }
        const sel = document.querySelector('.cal-day.selected');
        if (sel && calSelected === dateStr) selectDay(dateStr, sel);
        showToast(t('illusGenerated'));
      } else {
        showToast(t('illusFail') + '：' + (data.error || '未知错误'));
      }
    } catch(e) { showToast(t('illusFail2')); }
  }

  // Word export
  async function exportToWord() {
    const validEntries = entries.filter(e => !e.loading && e.text && !e.hidden);
    if (validEntries.length === 0) { showToast(t('noExport')); return; }
    showToast(t('exporting'));
    // 收集涉及的日期，批量读取插图
    const dates = [...new Set(validEntries.map(e => e.date))];
    const illustrations = {};
    for (const d of dates) {
      const img = await getIllus(d);
      if (img) illustrations[d] = img;
    }
    const exportSummaries = Object.fromEntries(dates.filter(d => summaries[d]).map(d => [d, summaries[d]]));
    const exportTitles = Object.fromEntries(dates.filter(d => titles[d]).map(d => [d, titles[d]]));
    try {
      const res = await fetch('/api/export', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ entries: validEntries, summaries: exportSummaries, titles: exportTitles, illustrations })
      });
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `碎碎念_${getTodayStr()}.docx`;
      a.click();
      URL.revokeObjectURL(a.href);
    } catch(e) {
      showToast(t('exportFail'));
    }
  }

  async function exportAllData() {
    const illus = await getAllIllus();
    const payload = {
      version: 1,
      exportedAt: new Date().toISOString(),
      localStorage: {
        vd_entries:      localStorage.getItem('vd_entries')      || '[]',
        vd_summaries:    localStorage.getItem('vd_summaries')    || '{}',
        vd_titles:       localStorage.getItem('vd_titles')       || '{}',
        vd_translations: localStorage.getItem('vd_translations') || '{}',
        vd_likes:        localStorage.getItem('vd_likes')        || '{}',
      },
      illus,
    };
    const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `voice-diary-backup-${getTodayStr()}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast(t('exportDataOk'));
  }

  async function importAllData(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = '';
    try {
      const payload = JSON.parse(await file.text());
      if (!payload.version || !payload.localStorage) throw new Error('invalid');
      for (const [key, val] of Object.entries(payload.localStorage)) {
        localStorage.setItem(key, val);
      }
      if (Array.isArray(payload.illus)) {
        for (const { dateStr, dataUrl } of payload.illus) {
          await saveIllus(dateStr, dataUrl);
        }
      }
      showToast(t('importDataOk'));
      setTimeout(() => location.reload(), 1200);
    } catch (e) {
      console.error(e);
      showToast(t('importDataFail'));
    }
  }

  // Init
  const _now = new Date();
  calYear = _now.getFullYear();
  calMonth = _now.getMonth();
  setTheme(localStorage.getItem('vd_theme') || 'auto');
  renderEntries();
  // Restore today's summary and title if exists
  const todaySummary = summaries[getTodayStr()];
  if (todaySummary) {
    document.getElementById('summaryTitle').textContent = titles[getTodayStr()] || '';
    document.getElementById('summaryText').textContent = todaySummary;
    document.getElementById('summaryCard').classList.add('visible');
    document.getElementById('summaryBtn').innerHTML = t('regen');
  }
  // Restore today's illustration if exists
  getIllus(getTodayStr()).then(dataUrl => {
    if (dataUrl) {
      const area = document.getElementById('illustrationArea');
      if (area) area.innerHTML = `<img src="${dataUrl}" style="width:100%;border-radius:12px;margin-top:4px;display:block">`;
    }
  });
</script>
</body>
</html>
